  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1b2d4f;
      --navy-light: #2c4470;
      --slate: #6b7a8d;
      --silver: #c5cdd8;
      --fog: #f4f5f7;
      --fog-dark: #eaedf1;
      --white: #ffffff;
      --text: #1a1f2b;
      --text-muted: #4a5568;
      --serif: 'EB Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--serif); background: var(--fog); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .page { max-width: 760px; margin: 0 auto; padding: 3rem 2rem 5rem; }

    /* Hero */
    .hero { display: grid; grid-template-columns: 120px 1fr; gap: 2.2rem; padding-bottom: 1.8rem; border-bottom: 1px solid var(--silver); animation: fadeUp 0.6s ease both; }
    .avatar-photo { width: 110px; height: 140px; object-fit: cover; object-position: center top; flex-shrink: 0; display: block; filter: grayscale(15%); }
    .hero-text { flex: 1; padding-top: 4px; }
    .h-name { font-family: var(--serif); font-size: 32px; font-weight: 500; color: var(--navy); letter-spacing: 0.02em; line-height: 1.1; }
    .h-email { font-family: var(--sans); font-size: 12.5px; color: var(--navy); margin-top: 10px; display: flex; align-items: center; gap: 5px; }
    .h-email a { color: var(--navy); text-decoration: none; border-bottom: 0.5px solid var(--navy); padding-bottom: 1px; transition: color 0.2s, border-color 0.2s; }
    .h-email a:hover { color: var(--navy-light); border-color: var(--navy-light); }
    .h-email svg { width: 13px; height: 13px; stroke: var(--navy); stroke-width: 1.8; fill: none; flex-shrink: 0; }
    .tags { display: flex; flex-wrap: nowrap; gap: 6px; margin-top: 12px; overflow-x: auto; }
    .tag { font-family: var(--sans); font-size: 10.5px; color: var(--navy); border: 0.5px solid var(--navy); padding: 3px 10px; border-radius: 2px; letter-spacing: 0.04em; white-space: nowrap; }

    /* Sections */
    .sec { margin-top: 2.2rem; animation: fadeUp 0.6s ease both; }
    .sec:nth-child(2) { animation-delay: 0.05s; }
    .sec:nth-child(3) { animation-delay: 0.1s; }
    .sec:nth-child(4) { animation-delay: 0.15s; }
    .sec-hd { font-family: var(--sans); font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--navy); border-bottom: 0.5px solid var(--navy); padding-bottom: 6px; margin-bottom: 1.2rem; }

    /* Bio */
    .bio { font-size: 15px; line-height: 1.9; color: var(--text); font-family: var(--serif); }

    /* Publications */
    .pub-list { display: flex; flex-direction: column; }
    .pub { display: flex; gap: 14px; padding: 11px 0; border-bottom: 0.5px solid var(--silver); }
    .pub:last-child { border-bottom: none; }
    .pub-year { font-family: var(--sans); font-size: 11px; color: var(--slate); min-width: 34px; padding-top: 3px; flex-shrink: 0; }
    .pub-body { flex: 1; }
    .pub-title { font-family: var(--serif); font-size: 14px; color: var(--text); line-height: 1.55; }
    .pub-meta { font-family: var(--sans); font-size: 11.5px; color: var(--slate); margin-top: 4px; }
    .pub-meta em { font-style: italic; color: var(--text-muted); }

    /* Footer */
    .foot { font-family: var(--sans); font-size: 10.5px; color: var(--silver); text-align: center; margin-top: 3rem; letter-spacing: 0.08em; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 560px) {
      .page { padding: 2rem 1.2rem 4rem; }
      .hero { grid-template-columns: 90px 1fr; gap: 1.4rem; }
      .avatar-photo { width: 85px; height: 108px; }
      .h-name { font-size: 24px; }
      .tags { flex-wrap: wrap; }
    }
    @media print { body { background: white; } .page { padding: 1.5rem; } }
  </style>
